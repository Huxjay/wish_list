<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Wishlist Pro</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

:root{
    --bg:#0f172a;
    --bg-glass:rgba(255,255,255,0.05);
    --card:rgba(255,255,255,0.08);
    --border:rgba(255,255,255,0.15);
    --text:#f8fafc;
    --muted:#94a3b8;
    --accent:#8b5cf6;
    --accent-hover:#7c3aed;
    --success:#22c55e;
    --danger:#ef4444;
    --radius:18px;
}

body.light{
    --bg:#f1f5f9;
    --bg-glass:rgba(255,255,255,0.7);
    --card:#ffffff;
    --border:rgba(0,0,0,0.08);
    --text:#0f172a;
    --muted:#64748b;
}

*{
    box-sizing:border-box;
    margin:0;
    padding:0;
}

body{
    font-family:'Inter',sans-serif;
    background:radial-gradient(circle at top left,#7c3aed,#0f172a);
    color:var(--text);
    min-height:100vh;
    display:flex;
    justify-content:center;
    padding:60px 15px;
    transition:all .4s ease;
}

.container{
    width:100%;
    max-width:650px;
}

.card{
    background:var(--bg-glass);
    backdrop-filter:blur(25px);
    -webkit-backdrop-filter:blur(25px);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:35px;
    box-shadow:
        0 8px 32px rgba(0,0,0,.25),
        inset 0 1px 0 rgba(255,255,255,.05);
    transition:.4s;
}

h1{
    font-weight:700;
    font-size:1.8rem;
    letter-spacing:-.5px;
}

.top-bar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:25px;
}

.toggle{
    background:linear-gradient(135deg,var(--accent),var(--accent-hover));
    border:none;
    padding:8px 16px;
    border-radius:50px;
    color:white;
    cursor:pointer;
    font-weight:600;
    transition:.3s;
    box-shadow:0 5px 15px rgba(139,92,246,.4);
}

.toggle:hover{
    transform:translateY(-2px);
}

input,select{
    width:100%;
    padding:12px 14px;
    margin-bottom:14px;
    border-radius:12px;
    border:1px solid var(--border);
    background:var(--card);
    color:var(--text);
    font-size:.95rem;
    transition:.25s;
}

input:focus,select:focus{
    border-color:var(--accent);
    box-shadow:0 0 0 3px rgba(139,92,246,.2);
    outline:none;
}

button.add{
    width:100%;
    padding:13px;
    border:none;
    border-radius:14px;
    font-weight:600;
    cursor:pointer;
    background:linear-gradient(135deg,var(--accent),var(--accent-hover));
    color:white;
    transition:.3s;
    box-shadow:0 10px 25px rgba(139,92,246,.4);
}

button.add:hover{
    transform:translateY(-3px);
    box-shadow:0 15px 30px rgba(139,92,246,.5);
}

.search{
    margin-bottom:20px;
}

ul{
    list-style:none;
    margin-top:25px;
}

li{
    background:var(--card);
    border:1px solid var(--border);
    padding:18px;
    border-radius:16px;
    margin-bottom:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    transition:.3s ease;
    cursor:grab;
}

li:hover{
    transform:translateY(-4px);
    box-shadow:0 15px 25px rgba(0,0,0,.2);
}

li.dragging{
    opacity:.4;
    transform:scale(.98);
}

.badge{
    display:inline-block;
    margin-top:6px;
    font-size:.75rem;
    padding:4px 8px;
    border-radius:50px;
    background:rgba(139,92,246,.15);
    color:var(--accent);
    font-weight:500;
}

.actions button{
    border:none;
    padding:8px 12px;
    border-radius:10px;
    font-size:.8rem;
    font-weight:600;
    cursor:pointer;
    transition:.25s;
}

.buy{
    background:var(--success);
    color:white;
}

.buy:hover{
    transform:scale(1.05);
}

.del{
    background:var(--danger);
    color:white;
}

.del:hover{
    transform:scale(1.05);
}

@media(max-width:500px){
    .card{
        padding:25px;
    }
}

</style>
</head>
<body>

<div class="container">
<div class="card">

<div class="top-bar">
<h1>Wishlist Pro</h1>
<button class="toggle" id="themeToggle">Toggle Mode</button>
</div>

<input type="text" id="searchInput" placeholder="Search wishlist..." class="search">

<input type="text" id="name" placeholder="Item name">
<input type="number" id="price" placeholder="Price">
<select id="category">
<option value="Tech">Tech</option>
<option value="Fashion">Fashion</option>
<option value="Gaming">Gaming</option>
<option value="Other">Other</option>
</select>

<button class="add" id="addBtn">Add Item</button>

<select id="filterCategory">
<option value="All">All Categories</option>
<option value="Tech">Tech</option>
<option value="Fashion">Fashion</option>
<option value="Gaming">Gaming</option>
<option value="Other">Other</option>
</select>

<ul id="list"></ul>

</div>
</div>

<script>
let wishlist = JSON.parse(localStorage.getItem("wishlistPro")) || [];

const listEl = document.getElementById("list");
const nameInput = document.getElementById("name");
const priceInput = document.getElementById("price");
const categoryInput = document.getElementById("category");
const searchInput = document.getElementById("searchInput");
const filterCategory = document.getElementById("filterCategory");

const save = () => localStorage.setItem("wishlistPro", JSON.stringify(wishlist));

function render(){
    listEl.innerHTML="";
    const search = searchInput.value.toLowerCase();
    const filter = filterCategory.value;

    wishlist
        .filter(item =>
            item.name.toLowerCase().includes(search) &&
            (filter==="All" || item.category===filter)
        )
        .forEach(item=>{
            const li=document.createElement("li");
            li.draggable=true;
            li.dataset.id=item.id;

            li.innerHTML=`
                <div>
                    <strong>${item.name}</strong> - $${item.price}
                    <div class="badge">${item.category}</div>
                </div>
                <div class="actions">
                    <button class="buy">✓</button>
                    <button class="del">X</button>
                </div>
            `;

            li.querySelector(".buy").onclick=()=>{
                li.style.opacity=".5";
            };

            li.querySelector(".del").onclick=()=>{
                wishlist=wishlist.filter(w=>w.id!==item.id);
                save();
                render();
            };

            addDragEvents(li);
            listEl.appendChild(li);
        });
}

document.getElementById("addBtn").onclick=()=>{
    if(!nameInput.value || !priceInput.value) return;

    wishlist.push({
        id:Date.now(),
        name:nameInput.value,
        price:priceInput.value,
        category:categoryInput.value
    });

    nameInput.value="";
    priceInput.value="";
    save();
    render();
};

searchInput.oninput=render;
filterCategory.onchange=render;

document.getElementById("themeToggle").onclick=()=>{
    document.body.classList.toggle("light");
};

/* Drag & Drop */

function addDragEvents(li){
    li.addEventListener("dragstart",()=>{
        li.classList.add("dragging");
    });

    li.addEventListener("dragend",()=>{
        li.classList.remove("dragging");
        updateOrder();
    });
}

listEl.addEventListener("dragover",e=>{
    e.preventDefault();
    const dragging=document.querySelector(".dragging");
    const afterElement=getDragAfterElement(e.clientY);
    if(afterElement==null){
        listEl.appendChild(dragging);
    }else{
        listEl.insertBefore(dragging,afterElement);
    }
});

function getDragAfterElement(y){
    const elements=[...listEl.querySelectorAll("li:not(.dragging)")];
    return elements.reduce((closest,child)=>{
        const box=child.getBoundingClientRect();
        const offset=y-box.top-box.height/2;
        if(offset<0 && offset>closest.offset){
            return {offset:offset, element:child};
        }else{
            return closest;
        }
    },{offset:Number.NEGATIVE_INFINITY}).element;
}

function updateOrder(){
    const ids=[...listEl.querySelectorAll("li")].map(li=>Number(li.dataset.id));
    wishlist.sort((a,b)=>ids.indexOf(a.id)-ids.indexOf(b.id));
    save();
}

render();
</script>

</body>
</html>
